services:
  - type: web
    name: trustlens-xrpl
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn trustlens.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRUSTLENS_BASE_URL
        value: https://trustlens-xrpl.onrender.com
